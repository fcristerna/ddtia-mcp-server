services:
  ghl-mcp:
    build: .
    container_name: ghl-mcp-calendario
    restart: unless-stopped
    environment:
      LOG_FILE: /app/logs/app.log
      API_SECRET_KEY:
      DAYS_AHEAD:
      FB_PAGE_ACCESS_TOKEN:
      GHL_API_KEY:
      GHL_ASSIGNED_USER:
      GHL_CALENDAR_ID:
      GHL_INBOUND_WEBHOOK_URL:
      GHL_LOCATION_ID:
      MCP_API_KEY:
      SLOT_DURATION_MIN:
      TIMEZONE:
    volumes:
      - logs_data:/app/logs
      - data:/app/data
      - /app/data/vault:/app/data/vault:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ghl-mcp.rule=Host(`mcp.despertartdigital.cloud`)"
      - "traefik.http.routers.ghl-mcp.entrypoints=websecure"
      - "traefik.http.routers.ghl-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.ghl-mcp.loadbalancer.server.port=8000"
    networks:
      - ddtia-net

volumes:
  logs_data:
  data:

networks:
  ddtia-net:
    external: true
